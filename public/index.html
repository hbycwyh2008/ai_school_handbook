<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI School Handbook Assistant</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>AI School Handbook Assistant</h1>
      <p class="sub">Ask handbook questions and get grounded answers with citations.</p>

      <section class="panel">
        <h2>Upload handbook</h2>
        <form id="ingest-form">
          <p>Handbook file</p>
          <div class="file-input">
            <button type="button" id="file-select-button">Choose file</button>
            <span id="file-selected-text" class="muted">No file chosen</span>
            <input type="file" id="handbook-file" name="file" accept=".docx,.txt,.md" />
          </div>
          <p class="muted">Or specify a server file path (optional):</p>
          <input type="text" id="handbook-path" placeholder="C:\\path\\to\\handbook.docx" />
          <button type="submit">Ingest handbook</button>
        </form>
        <p id="ingest-status" class="muted"></p>
      </section>

      <section class="panel">
        <h2>Ask a question</h2>
        <form id="ask-form">
          <textarea id="question" placeholder="What is the attendance policy?" rows="4" required></textarea>
          <button type="submit">Ask</button>
        </form>
        <p id="status"></p>
      </section>

      <section class="panel">
        <h2>Answer</h2>
        <div id="answer" class="answer">No answer yet.</div>
      </section>

      <section class="panel">
        <h2>Sources</h2>
        <ul id="sources" class="sources"></ul>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
